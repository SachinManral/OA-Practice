{id:176,s:'SE',q:'Which SDLC model follows a strict sequential phase-by-phase approach with no going back?',o:['Agile','Spiral','Waterfall','Incremental'],a:2,e:'Waterfall model: Requirements → Design → Implementation → Testing → Maintenance. Each phase must be completed before the next begins — inflexible for changing requirements.'},
{id:177,s:'SE',q:'In Agile development, a "Sprint" is:',o:['A type of software bug','A fixed-length iteration (typically 1-4 weeks) in which a shippable product increment is built','A performance benchmark test','A code review process'],a:1,e:'Scrum Sprint: time-boxed iteration (usually 2 weeks) delivering a potentially shippable product increment. Followed by Sprint Review and Retrospective.'},
{id:178,s:'SE',q:'What does unit testing test?',o:['The entire system end-to-end','Individual functions, methods, or classes in isolation','Integration between modules','User acceptance and usability'],a:1,e:'Unit testing validates individual units (functions/methods) in isolation, typically using mocks/stubs for dependencies. Done by developers.'},
{id:179,s:'SE',q:'Black-box testing focuses on:',o:['Testing internal code structure and logic','Testing based on input/output behavior without knowing internal implementation','Testing only the database layer','Performance under load'],a:1,e:'Black-box: tester has no knowledge of internal code; tests are driven by specifications/requirements. Includes equivalence partitioning and boundary value analysis.'},
{id:180,s:'SE',q:'Cyclomatic complexity measures:',o:['The number of lines of code','The number of independent execution paths through a program (complexity of control flow)','Memory usage','Number of function calls'],a:1,e:'McCabe\'s Cyclomatic Complexity = E − N + 2P (edges − nodes + 2×connected components). High value → more complex, harder to test and maintain.'},
{id:181,s:'SE',q:'The Spiral model of software development is best known for:',o:['Strictly sequential phases like Waterfall','Its emphasis on risk analysis and iterative refinement in each loop','Delivering software in small increments without planning','Pair programming'],a:1,e:'Spiral model: each spiral loop goes through planning, risk analysis, engineering, and evaluation. Risk-driven — ideal for large, high-risk projects.'},
{id:182,s:'SE',q:'Regression testing is performed to:',o:['Test new features only','Ensure that new code changes have not broken previously working functionality','Test software under extreme load','Test a single isolated unit'],a:1,e:'Regression testing re-runs existing test suites after changes to verify no previously passing tests now fail — critical in CI/CD pipelines.'},
{id:183,s:'SE',q:'What is a Use Case diagram in UML?',o:['A diagram showing the internal class structure','A diagram showing system functionality from the user\'s perspective, depicting actors and their interactions with the system','A timing diagram for real-time systems','A flowchart of algorithm logic'],a:1,e:'Use Case diagram: actors (users/systems) and use cases (functionalities). Shows WHAT the system does, not HOW. Used in requirements gathering.'},
{id:184,s:'SE',q:'Which type of software maintenance involves modifying software after delivery to correct discovered faults?',o:['Adaptive maintenance','Perfective maintenance','Preventive maintenance','Corrective maintenance'],a:3,e:'Corrective: fixes bugs. Adaptive: adapts to new environment. Perfective: improves performance/maintainability. Preventive: restructures to prevent future failures.'},
{id:185,s:'SE',q:'Continuous Integration (CI) means:',o:['Deploying to production after every commit','Frequently merging code changes into a shared repository, with automated builds and tests on each merge','Testing only at the end of the sprint','Manual code review before every commit'],a:1,e:'CI: developers integrate code frequently (multiple times per day). Each integration triggers automated build + test, detecting errors quickly.'},
{id:186,s:'SE',q:'The V-Model (Verification and Validation model) pairs each development phase with:',o:['A corresponding UML diagram','A corresponding testing phase (e.g., unit design ↔ unit testing)','A Scrum ceremony','A risk analysis step'],a:1,e:'V-Model: left side = development phases (requirements → design → coding), right side = testing phases (acceptance → integration → unit), joined at coding.'},
{id:187,s:'SE',q:'What is technical debt in software development?',o:['The cost of servers and infrastructure','The future rework cost incurred by choosing a quick/easy solution now instead of a better long-term approach','The number of open bugs','The salary cost of developers'],a:1,e:'Technical debt: shortcuts taken now (e.g., skipping tests, hacks) that create extra work later. Like financial debt — it accrues "interest" over time.'},
{id:188,s:'SE',q:'In Scrum, the Product Backlog is:',o:['A list of completed user stories','An ordered list of everything that might be needed in the product, managed by the Product Owner','The sprint plan for the current iteration','The list of team members'],a:1,e:'Product Backlog: prioritized list of all features, fixes, and enhancements desired in the product. Owned and ordered by the Product Owner.'},

{id:190,s:'SE',q:'A class diagram in UML shows:',o:['How objects interact over time','The static structure: classes, attributes, methods, and their relationships (inheritance, association, aggregation, composition)','Deployment of software on hardware','The flow of control in a use case'],a:1,e:'Class diagram is the most used UML diagram for OOP design — shows classes with their members and the structural relationships between them.'},

{id:192,s:'SE',q:'Which of the following is a key principle of the Agile Manifesto?',o:['Comprehensive documentation over working software','Responding to change over following a plan','Contract negotiation over customer collaboration','Processes and tools over individuals and interactions'],a:1,e:'The Agile Manifesto (2001) values: Individuals & interactions, Working software, Customer collaboration, Responding to change — OVER their counterparts.'},
{id:193,s:'SE',q:'Integration testing verifies:',o:['Individual units in isolation','That multiple modules/components work correctly together when combined','End-to-end user workflows','Performance under stress'],a:1,e:'Integration testing: combines units and tests their interfaces and interactions. Detects defects in the communication between modules.'},
{id:194,s:'SE',q:'The purpose of a Sequence Diagram in UML is to show:',o:['Class hierarchy and inheritance','Static data structure','How objects interact in time sequence, showing the order of messages exchanged','Deployment topology'],a:2,e:'Sequence diagram: shows the time-ordered exchange of messages between objects/lifelines. Excellent for documenting use case scenarios and API interactions.'},
{id:195,s:'SE',q:'MVC (Model-View-Controller) is a software architectural pattern where:',o:['Model handles UI, View handles data, Controller handles logic','Model represents data/business logic, View handles display, Controller handles user input and mediates between Model and View','All three components are identical','Controller stores all data'],a:1,e:'MVC separates concerns: Model = data/business rules, View = UI rendering, Controller = user input handler that updates Model and View.'},

function seededRandom(seed){
  let value = seed % 2147483647;
  if(value <= 0) value += 2147483646;
  return () => {
    value = value * 16807 % 2147483647;
    return (value - 1) / 2147483646;
  };
}

function hashString(str){
  let hash = 0;
  for(let i = 0; i < str.length; i++){
    hash = ((hash * 31) + str.charCodeAt(i)) % 2147483647;
  }
  return hash || 1;
}

function shuffleArray(items, seed){
  const arr = [...items];
  const rand = seededRandom(seed);
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(rand() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function shuffleQuestionOptions(list, bankSeed){
  return list.map(q => {
    const optionsWithFlag = q.o.map((option, index) => ({
      option,
      isCorrect: index === q.a
    }));
    const seed = hashString(`${bankSeed}|${q.id}|${q.q}|${q.e}`);
    const shuffled = shuffleArray(optionsWithFlag, seed);
    const answerIndex = shuffled.findIndex(item => item.isCorrect);

    return {
      ...q,
      o: shuffled.map(item => item.option),
      a: answerIndex
    };
  });
}

function escapeHtml(value){
  return String(value)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function formatText(value){
  return escapeHtml(value).replace(/\n/g,'<br>');
}

function letterFor(index){
  return String.fromCharCode(65 + index);
}

function createQuizState(count){
  return {
    active: false,
    q: [],
    idx: 0,
    answers: [],
    score: 0,
    timer: null,
    secs: 45,
    started: false,
    done: false,
    count: count || 10,
    correct: 0,
    wrong: 0,
    skipped: 0
  };
}

function createBankProgress(){
  return {
    browseAnswers: {},
    totalAnswered: 0,
    totalCorrect: 0,
    totalWrong: 0,
    totalScore: 0,
    quizState: createQuizState(10)
  };
}

const bankProgress = Object.keys(BANKS).reduce((acc, id) => {
  acc[id] = createBankProgress();
  return acc;
}, {});

let activeBankId = 'practice';
let currentSubject = 'ALL';
let currentMode = 'browse';
let roundSearchTerm = '';
let activeRoundFilter = 'ALL';
let activeDifficultyFilter = 'ALL';

function getActiveBank(){
  return BANKS[activeBankId];
}

function isRoundBank(bank = getActiveBank()){
  return bank.type === 'roundBank';
}

function getRoundQuestionsFlat(bank = getActiveBank()){
  return bank.rounds.flatMap(round => round.questions);
}

function getProgress(){
  return bankProgress[activeBankId];
}

function getQuizState(){
  return getProgress().quizState;
}

function resetQuizStateFor(bankId){
  const progress = bankProgress[bankId];
  clearInterval(progress.quizState.timer);
  progress.quizState = createQuizState(progress.quizState.count || 10);
}

function hasNoNegative(q, bank){
  const flag = bank.scoreConfig.noNegativeFlag;
  return flag ? !!q[flag] : false;
}

function getQuestionScore(bank, q, isCorrect){
  if(isCorrect) return bank.scoreConfig.correct;
  if(hasNoNegative(q, bank)) return 0;
  return bank.scoreConfig.wrong;
}

function getSubjectCount(subject){
  const bank = getActiveBank();
  if(isRoundBank(bank)){
    const questions = getRoundQuestionsFlat(bank);
    if(subject==='ALL') return questions.length;
    return questions.filter(q=>q.tags.includes(subject)).length;
  }
  if(subject==='ALL') return bank.questions.length;
  return bank.questions.filter(q=>q.s===subject).length;
}

function getFiltered(){
  const bank = getActiveBank();
  if(isRoundBank(bank)){
    return bank.rounds.map(round => ({
      ...round,
      questions: round.questions.filter(q => {
        const byRound = activeRoundFilter === 'ALL' || round.short === activeRoundFilter;
        const byDifficulty = activeDifficultyFilter === 'ALL' || q.diff === activeDifficultyFilter;
        const byTopic = currentSubject === 'ALL' || q.tags.includes(currentSubject);
        const haystack = `${q.t} ${q.tags.join(' ')} ${q.diff} ${q.p}`.toLowerCase();
        return byRound && byDifficulty && byTopic && (!roundSearchTerm || haystack.includes(roundSearchTerm));
      })
    })).filter(round => round.questions.length);
  }
  if(currentSubject==='ALL') return bank.questions;
  return bank.questions.filter(q=>q.s===currentSubject);
}

function getCountOptions(total){
  const bank = getActiveBank();
  const cap = Math.min(total, bank.countLimit || total);
  return [...new Set([10, 20, cap].filter(value => value > 0 && value <= total))];
}

function normalizeQuizCount(total){
  const progress = getProgress();
  const options = getCountOptions(total);
  if(!options.length){
    progress.quizState.count = 0;
    return 0;
  }
  if(!options.includes(progress.quizState.count)){
    progress.quizState.count = progress.quizState.count > options[options.length-1] ? options[options.length-1] : options[0];
  }
  return progress.quizState.count;
}

function renderHeader(){
  const bank = getActiveBank();
  const total = isRoundBank(bank) ? getRoundQuestionsFlat(bank).length : bank.questions.length;
  document.getElementById('pageTitle').textContent = bank.title;
  document.getElementById('headerMeta').textContent = `${total} questions - ${bank.badge}`;
}

function renderSetBar(){
  document.getElementById('setBar').innerHTML = Object.values(BANKS).map(bank => {
    const active = bank.id === activeBankId ? ' active' : '';
    return `<button class="set-btn${active}" onclick="switchSet('${bank.id}')">${escapeHtml(bank.label)}</button>`;
  }).join('');
}

function renderTabs(){
  const bank = getActiveBank();
  document.getElementById('tabBar').innerHTML = bank.subjectOrder.map(subject => {
    const active = currentSubject===subject ? ' active' : '';
    return `<button class="tab${active}" onclick="filterSubject('${subject}')">${escapeHtml(bank.subjectLabels[subject])} (${getSubjectCount(subject)})</button>`;
  }).join('');
}

function updateModeButtons(){
  const bank = getActiveBank();
  const roundBank = isRoundBank(bank);
  const hasCoding = Boolean(bank.codingChallenges && bank.codingChallenges.length);
  document.getElementById('browseBtn').className='mode-btn'+(currentMode==='browse'?' active':'');
  document.getElementById('quizBtn').className='mode-btn'+(currentMode==='quiz'?' active':'');
  document.getElementById('codingBtn').className='mode-btn'+(currentMode==='coding'?' active':'');
  document.getElementById('quizBtn').hidden = roundBank;
  document.getElementById('codingBtn').hidden = roundBank || !hasCoding;
  document.querySelector('.stat-row').hidden = roundBank || currentMode === 'coding';
}

function switchSet(bankId){
  if(bankId === activeBankId) return;
  resetQuizStateFor(activeBankId);
  activeBankId = bankId;
  currentSubject = 'ALL';
  currentMode = 'browse';
  roundSearchTerm = '';
  activeRoundFilter = 'ALL';
  activeDifficultyFilter = 'ALL';
  renderApp();
}

function setMode(m){
  if(m === 'quiz' && isRoundBank()) return;
  if(m === 'coding' && !(getActiveBank().codingChallenges || []).length) return;
  currentMode = m;
  updateModeButtons();
  if(m==='quiz' && !getQuizState().started){
    resetQuizStateFor(activeBankId);
  }
  renderMain();
}

function filterSubject(s){
  currentSubject = s;
  if(currentMode==='quiz') resetQuizStateFor(activeBankId);
  renderTabs();
  renderMain();
}

function renderMain(){
  const m = document.getElementById('main');
  if(isRoundBank()){
    currentMode = 'browse';
    m.innerHTML = renderRoundBankBrowse();
    updateModeButtons();
    return;
  }
  if(currentMode === 'coding') {
    m.innerHTML = renderCodingChallenges();
    updateModeButtons();
    return;
  }
  if(currentMode==='browse') m.innerHTML = renderBrowse();
  else m.innerHTML = renderQuizArea();
}

function renderRoundBankBrowse(){
  const bank = getActiveBank();
  const rounds = getFiltered();
  const shownTotal = rounds.reduce((sum, round) => sum + round.questions.length, 0);
  const allTotal = getRoundQuestionsFlat(bank).length;
  const topicSummary = getTopRoundTopics(bank, 3).join(', ');
  const hardCount = getRoundQuestionsFlat(bank).filter(q => q.diff === 'hard').length;
  const header = `<section class="round-hero">
    <div class="round-hero-top">
      <div>
        <div class="round-eyebrow">Coding and interview round bank</div>
        <div class="round-bank-title">${escapeHtml(bank.title)}</div>
        <div class="round-bank-subtitle">${escapeHtml(bank.description)}</div>
      </div>
      <span class="round-hero-badge">Browse only</span>
    </div>
    <div class="round-bank-stats">
      <div class="round-stat"><b>${shownTotal}</b>Questions in view</div>
      <div class="round-stat"><b>${allTotal}</b>Total DSA prompts</div>
      <div class="round-stat"><b>${bank.rounds.length}</b>Non-MCQ rounds</div>
      <div class="round-stat"><b>${hardCount}</b>Hard problems</div>
    </div>
  </section>`;
  const controls = `<section class="round-control-panel">
    <input class="round-search" id="roundSearchBox" type="text" value="${escapeHtml(roundSearchTerm)}" placeholder="Search by keyword, topic, difficulty, or platform..." oninput="setRoundSearch(this.value)">
    <div class="round-filter-row">
      <span class="round-filter-label">Difficulty</span>
      ${renderRoundFilterButton('All', 'ALL', activeDifficultyFilter, 'setRoundDifficulty')}
      ${renderRoundFilterButton('Easy', 'easy', activeDifficultyFilter, 'setRoundDifficulty')}
      ${renderRoundFilterButton('Medium', 'medium', activeDifficultyFilter, 'setRoundDifficulty')}
      ${renderRoundFilterButton('Hard', 'hard', activeDifficultyFilter, 'setRoundDifficulty')}
    </div>
    <div class="round-filter-row">
      <span class="round-filter-label">Round</span>
      ${renderRoundFilterButton('All rounds', 'ALL', activeRoundFilter, 'setRoundFilter')}
      ${bank.rounds.map(round => renderRoundFilterButton(round.short, round.short, activeRoundFilter, 'setRoundFilter')).join('')}
    </div>
  </section>`;
  const roadmap = `<aside class="round-roadmap">
    <div class="round-roadmap-title">Round roadmap</div>
    ${renderRoundRoadmapButton({short:'ALL', name:'All rounds', desc:`${topicSummary} focus`, questions:getRoundQuestionsFlat(bank)}, activeRoundFilter)}
    ${bank.rounds.map(round => renderRoundRoadmapButton(round, activeRoundFilter)).join('')}
  </aside>`;
  if(!rounds.length){
    return `<div class="round-study">${header}${controls}<div class="round-layout">${roadmap}<div class="round-empty"><b>No matching questions</b>Try clearing a filter or searching a broader topic.</div></div></div>`;
  }
  const body = rounds.map(round => `<section class="round-section">
    <button class="round-heading" onclick="toggleRoundSection(this)">
      <span class="round-badge ${round.badge}">${escapeHtml(round.short)}</span>
      <span class="round-heading-main">
        <span class="round-name">${escapeHtml(round.name)}</span>
        <span class="round-desc">${escapeHtml(round.desc)}</span>
      </span>
      <span class="round-count">${round.questions.length} question${round.questions.length!==1?'s':''}</span>
      <span class="round-toggle">v</span>
    </button>
    <div class="round-list">
      ${round.questions.map((q, i) => `<article class="round-q">
        <span class="round-q-num">${String(i + 1).padStart(2,'0')}</span>
        <div class="round-q-body">
          <div class="round-q-kicker">${escapeHtml(round.short)} / ${escapeHtml(q.diff.toUpperCase())}${q.p ? ` / ${escapeHtml(q.p)}` : ''}</div>
          <div class="round-q-text">${formatText(q.t)}</div>
          <div class="round-tags">
            ${q.tags.map(tag => `<span class="round-tag">${escapeHtml(tag)}</span>`).join('')}
            <span class="round-tag ${escapeHtml(q.diff)}">${escapeHtml(q.diff.charAt(0).toUpperCase()+q.diff.slice(1))}</span>
            ${q.p ? `<span class="round-tag platform">${escapeHtml(q.p)}</span>` : ''}
          </div>
        </div>
      </article>`).join('')}
    </div>
  </section>`).join('');
  const resultHeader = `<div class="round-results-top"><span><b>${shownTotal}</b> questions grouped by round</span><span>${escapeHtml(currentSubject === 'ALL' ? 'All topics' : currentSubject)}</span></div>`;
  return `<div class="round-study">${header}${controls}<div class="round-layout">${roadmap}<main class="round-results">${resultHeader}${body}</main></div></div>`;
}

function renderRoundFilterButton(label, value, current, fnName){
  const active = value === current ? ' active' : '';
  return `<button class="round-filter-btn${active}" onclick="${fnName}('${escapeHtml(value)}')">${escapeHtml(label)}</button>`;
}

function renderRoundRoadmapButton(round, current){
  const active = round.short === current ? ' active' : '';
  const count = round.questions.length;
  return `<button class="round-roadmap-btn${active}" onclick="setRoundFilter('${escapeHtml(round.short)}')">
    <span class="round-roadmap-main">
      <span class="round-roadmap-name">${escapeHtml(round.name)}</span>
      <span class="round-roadmap-count">${count}</span>
    </span>
    <span class="round-roadmap-desc">${escapeHtml(round.desc)}</span>
  </button>`;
}

function getTopRoundTopics(bank, limit){
  const counts = {};
  getRoundQuestionsFlat(bank).forEach(q => q.tags.forEach(tag => {
    counts[tag] = (counts[tag] || 0) + 1;
  }));
  return Object.entries(counts)
    .sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]))
    .slice(0, limit)
    .map(([tag]) => tag);
}

function toggleRoundSection(btn){
  const section = btn.closest('.round-section');
  section.classList.toggle('collapsed');
  btn.querySelector('.round-toggle').textContent = section.classList.contains('collapsed') ? '>' : 'v';
}

function setRoundFilter(value){
  activeRoundFilter = value;
  renderMain();
}

function setRoundDifficulty(value){
  activeDifficultyFilter = value;
  renderMain();
}

function setRoundSearch(value){
  roundSearchTerm = value.toLowerCase().trim();
  renderMain();
  setTimeout(() => {
    const input = document.getElementById('roundSearchBox');
    if(input){
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    }
  }, 0);
}

function renderCodingChallenges(){
  const bank = getActiveBank();
  const challenges = bank.codingChallenges || [];
  if(!challenges.length) return '<div class="no-q">No coding challenges found.</div>';
  const difficultyCounts = challenges.reduce((acc, item) => {
    acc[item.diff] = (acc[item.diff] || 0) + 1;
    return acc;
  }, {});
  const stats = ['easy', 'medium', 'hard'].map(diff => {
    const count = difficultyCounts[diff] || 0;
    return `<span class="coding-pill ${diff}">${diff}: ${count}</span>`;
  }).join('');
  const cards = challenges.map(item => {
    const safeId = escapeHtml(item.id);
    return `<article class="coding-card" id="coding-card-${safeId}">
      <button class="coding-head" onclick="toggleCodingChallenge('${safeId}')">
        <span class="coding-num">${safeId}</span>
        <span class="coding-main">
          <span class="coding-name">${escapeHtml(item.title)}</span>
          <span class="coding-topic">${escapeHtml(item.topic)}</span>
        </span>
        <span class="coding-diff coding-pill ${escapeHtml(item.diff)}">${escapeHtml(item.diff)}</span>
      </button>
      <div class="coding-body">
        <p class="coding-desc">${formatText(item.desc)}</p>
        <div class="coding-label">Examples</div>
        <div class="coding-code">${formatText(item.examples)}</div>
        <div class="coding-actions">
          <button class="coding-small-btn" onclick="toggleCodingHint('${safeId}')">Hint</button>
          <button class="coding-small-btn" onclick="toggleCodingSolution('${safeId}')">Solution</button>
        </div>
        <div class="coding-panel" id="coding-hint-${safeId}">${formatText(item.hint)}</div>
        <div class="coding-panel solution" id="coding-solution-${safeId}">${formatText(item.solution)}</div>
      </div>
    </article>`;
  }).join('');
  return `<section class="coding-hero">
    <div class="coding-title">${escapeHtml(bank.title)} - Coding Challenges</div>
    <div class="coding-subtitle">20 frontend coding prompts from the V2 set, with examples, hints, and reference solutions.</div>
    <div class="coding-stats">${stats}<span class="coding-pill">total: ${challenges.length}</span></div>
  </section>
  <section class="coding-list">${cards}</section>`;
}

function toggleCodingChallenge(id){
  const card = document.getElementById(`coding-card-${id}`);
  if(card) card.classList.toggle('open');
}

function toggleCodingHint(id){
  const panel = document.getElementById(`coding-hint-${id}`);
  if(panel) panel.classList.toggle('open');
}

function toggleCodingSolution(id){
  const panel = document.getElementById(`coding-solution-${id}`);
  if(panel) panel.classList.toggle('open');
}

function renderBrowse(){
  const bank = getActiveBank();
  const progress = getProgress();
  const qs = getFiltered();
  if(!qs.length) return '<div class="no-q">No questions found.</div>';
  return qs.map(q=>{
    const sc = bank.subjectColors[q.s]||'dsa';
    const answered = progress.browseAnswers[q.id] !== undefined;
    const userAns = progress.browseAnswers[q.id];
    const opts = q.o.map((o,i)=>{
      let cls='opt';
      if(answered){
        if(i===q.a) cls+=' reveal';
        else if(i===userAns) cls+=' wrong';
      }
      return `<button class="${cls}" onclick="browseAnswer(${q.id},${i})" ${answered?'disabled':''}><span class="opt-label">${letterFor(i)}</span>${escapeHtml(o)}</button>`;
    }).join('');
    const expBlock = answered ? `<div class="answer-reveal"><b>Answer: ${letterFor(q.a)}) ${escapeHtml(q.o[q.a])}</b><br>${formatText(q.e)}</div>` : '';
    const codeBlock = q.c ? `<div class="q-code">${escapeHtml(q.c)}</div>` : '';
    const flag = hasNoNegative(q, bank) ? '<span class="question-flag">No negative</span>' : '';
    return `<div class="question-block" data-qid="${q.id}">
      <div class="q-header">
        <div class="q-num">${q.id}</div>
        <div class="q-text" style="flex:1">${escapeHtml(q.q)}${flag}</div>
        <span class="q-subject ${sc}">${escapeHtml(q.s)}</span>
      </div>
      ${codeBlock}
      <div class="options-list">${opts}</div>
      ${expBlock}
    </div>`;
  }).join('');
}

function browseAnswer(qid, chosen){
  const bank = getActiveBank();
  const progress = getProgress();
  if(progress.browseAnswers[qid]!==undefined) return;
  const q = bank.questions.find(x=>x.id===qid);
  progress.browseAnswers[qid]=chosen;
  progress.totalAnswered++;
  if(chosen===q.a){
    progress.totalCorrect++;
    progress.totalScore += getQuestionScore(bank, q, true);
  }else{
    progress.totalWrong++;
    progress.totalScore += getQuestionScore(bank, q, false);
  }
  updateStats();
  renderMain();
  setTimeout(()=>{
    const el = document.querySelector(`[data-qid="${qid}"]`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },50);
}

function updateStats(){
  const bank = getActiveBank();
  if(isRoundBank(bank)) return;
  const progress = getProgress();
  const showDetailed = bank.scoreConfig.wrong !== 0;
  document.getElementById('answeredCount').textContent=progress.totalAnswered;
  document.getElementById('correctCount').textContent=progress.totalCorrect;
  document.getElementById('wrongCount').textContent=progress.totalWrong;
  document.getElementById('scoreCount').textContent=progress.totalScore;
  document.getElementById('wrongStat').hidden = !showDetailed;
  document.getElementById('scoreStat').hidden = !showDetailed;
}

function renderQuizArea(){
  const bank = getActiveBank();
  const quizState = getQuizState();
  if(!quizState.started){
    const qs = getFiltered();
    const sub = currentSubject==='ALL'?'All Subjects':currentSubject;
    const currentCount = normalizeQuizCount(qs.length);
    const countButtons = getCountOptions(qs.length).map(count => {
      const active = currentCount===count ? 'active' : '';
      const label = count===qs.length ? `All ${count}` : `${count} Qs`;
      return `<button class="${active}" onclick="setCount(${count})">${label}</button>`;
    }).join('');
    const note = bank.quizNote ? `<div class="quiz-note">${formatText(bank.quizNote)}</div>` : '';
    return `<div class="quiz-start">
      <h2>Quiz Mode — ${sub}</h2>
      <p>${qs.length} questions available · 45 seconds per question</p>
      <div class="count-sel" id="countSel">${countButtons}</div>
      ${note}
      <button class="big-btn" onclick="startQuiz()">Start Quiz →</button>
    </div>`;
  }
  if(quizState.done){
    return renderResult();
  }
  const q = quizState.q[quizState.idx];
  const sc = bank.subjectColors[q.s]||'dsa';
  const pct = Math.round((quizState.idx/quizState.q.length)*100);
  const answered = quizState.answers[quizState.idx]!==undefined;
  const userAns = quizState.answers[quizState.idx];
  const opts = q.o.map((o,i)=>{
    let cls='opt';
    if(answered){
      if(i===q.a) cls+=' reveal';
      else if(i===userAns) cls+=' wrong';
    }
    return `<button class="${cls}" onclick="quizAnswer(${i})" ${answered?'disabled':''}><span class="opt-label">${letterFor(i)}</span>${escapeHtml(o)}</button>`;
  }).join('');
  const expBlock = answered ? `<div class="answer-reveal"><b>Answer: ${letterFor(q.a)}) ${escapeHtml(q.o[q.a])}</b><br>${formatText(q.e)}</div>` : '';
  const codeBlock = q.c ? `<div class="q-code">${escapeHtml(q.c)}</div>` : '';
  const flag = hasNoNegative(q, bank) ? '<span class="question-flag">No negative</span>' : '';
  const isLast = quizState.idx===quizState.q.length-1;
  const navBtn = answered ? `<button class="nav-btn primary" onclick="quizNext()">${isLast?'See Results':'Next →'}</button>` : '';
  const skipBtn = !answered ? `<button class="skip-btn" onclick="quizSkip()">Skip</button>` : '';
  const warn = quizState.secs<=10;
  return `<div class="quiz-card">
    <div class="quiz-top">
      <span class="quiz-subj ${sc}">${escapeHtml(q.s)}</span>
      <span class="quiz-timer${warn?' warn':''}" id="qtimer">⏱ ${quizState.secs}s</span>
    </div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-qnum">Question ${quizState.idx+1} of ${quizState.q.length} · Score: ${quizState.score}</div>
    <div class="quiz-qtext">${escapeHtml(q.q)}${flag}</div>
    ${codeBlock}
    <div class="options-list">${opts}</div>
    ${expBlock}
    <div class="quiz-nav">${skipBtn}${navBtn}</div>
  </div>`;
}

function renderResult(){
  const bank = getActiveBank();
  const quizState = getQuizState();
  const total = quizState.q.length;
  const accuracy = total ? Math.round((quizState.correct/total)*100) : 0;
  const maxScore = total * bank.scoreConfig.correct;
  const pct = accuracy;
  const wrong = quizState.wrong;
  const skipped = quizState.skipped;
  const grade = pct>=80?'Excellent! OA-Ready 🏆':pct>=60?'Good effort, keep practicing!':'More revision needed 📖';
  return `<div class="result-card">
    <div class="score-ring"><div class="pct">${pct}%</div><div class="lbl">Score</div></div>
    <h2>${grade}</h2>
    <p>You scored ${quizState.score} out of ${total} questions</p>
    <div class="result-stats">
      <div class="rs"><div class="rs-num" style="color:#4ade80">${quizState.correct}</div><div class="rs-lbl">Correct</div></div>
      <div class="rs"><div class="rs-num" style="color:#f87171">${wrong}</div><div class="rs-lbl">Wrong</div></div>
      <div class="rs"><div class="rs-num" style="color:#fb923c">${skipped}</div><div class="rs-lbl">Skipped</div></div>
    </div>
    <div class="action-row">
      <button class="primary" onclick="startQuiz()">Retry</button>
      <button onclick="resetQuiz()">Change Topic</button>
    </div>
  </div>`;
}

function setCount(n){
  getProgress().quizState.count=n;
  renderMain();
}

function startQuiz(){
  const bank = getActiveBank();
  const progress = getProgress();
  clearInterval(progress.quizState.timer);
  const pool = getFiltered();
  const shuffled = [...pool].sort(()=>Math.random()-0.5);
  const count = normalizeQuizCount(pool.length)||Math.min(10,pool.length);
  progress.quizState={active:true,q:shuffled.slice(0,count),idx:0,answers:new Array(count).fill(undefined),score:0,timer:null,secs:bank.scoreConfig.timerSeconds,started:true,done:false,count:count,correct:0,wrong:0,skipped:0};
  renderMain();
  startTimer();
}

function resetQuiz(){
  resetQuizStateFor(activeBankId);
  renderMain();
}

function startTimer(){
  const bank = getActiveBank();
  const quizState = getQuizState();
  clearInterval(quizState.timer);
  quizState.secs=bank.scoreConfig.timerSeconds;
  quizState.timer=setInterval(()=>{
    quizState.secs--;
    const el=document.getElementById('qtimer');
    if(el){el.textContent='⏱ '+quizState.secs+'s';if(quizState.secs<=10)el.classList.add('warn');}
    if(quizState.secs<=0){clearInterval(quizState.timer);quizSkip();}
  },1000);
}

function quizAnswer(chosen){
  const bank = getActiveBank();
  const quizState = getQuizState();
  if(quizState.answers[quizState.idx]!==undefined) return;
  clearInterval(quizState.timer);
  quizState.answers[quizState.idx]=chosen;
  const q=quizState.q[quizState.idx];
  if(chosen===q.a){
    quizState.correct++;
    quizState.score += getQuestionScore(bank, q, true);
  }else{
    quizState.wrong++;
    quizState.score += getQuestionScore(bank, q, false);
  }
  renderMain();
}

function quizSkip(){
  const quizState = getQuizState();
  clearInterval(quizState.timer);
  if(quizState.answers[quizState.idx]===undefined){
    quizState.answers[quizState.idx]=-1;
    quizState.skipped++;
  }
  renderMain();
}

function quizNext(){
  const quizState = getQuizState();
  if(quizState.idx>=quizState.q.length-1){quizState.done=true;renderMain();return;}
  quizState.idx++;
  renderMain();
  startTimer();
}

function renderApp(){
  renderHeader();
  renderSetBar();
  renderTabs();
  updateModeButtons();
  updateStats();
  renderMain();
}

renderApp();
</script>
